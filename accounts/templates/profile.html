{% extends "base.html" %}

{% block content %}
<h2 class="text-3xl font-bold text-[#0B2046] mb-8" style="font-family: 'Marcellus SC', serif;">Pengaturan Profil</h2>

<form method="POST" action="{% url 'accounts:update_profile' %}">
    {% csrf_token %}
    <div class="grid grid-cols-2 gap-6">
        <div>
            <label class="block text-gray-700 font-semibold mb-2">Email</label>
            <input type="email" name="email" value="{{ user.email }}" readonly class="w-full p-3 border rounded-lg bg-gray-100 cursor-not-allowed">
        </div>
        
        <div>
            <label class="block text-gray-700 font-semibold mb-2">Salutation</label>
            <select name="salutation" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="Mr." {% if user.salutation == 'Mr.' %}selected{% endif %}>Mr.</option>
                <option value="Ms." {% if user.salutation == 'Ms.' %}selected{% endif %}>Ms.</option>
                <option value="Mrs." {% if user.salutation == 'Mrs.' %}selected{% endif %}>Mrs.</option>
            </select>
        </div>
    </div>
    
    <button type="submit" class="mt-8 bg-[#0B2046] text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-800 transition">
        Simpan Perubahan
    </button>
</form>
{% endblock %}
