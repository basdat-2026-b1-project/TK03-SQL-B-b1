{% extends "base.html" %}

{% block content %}
<h2 class="text-3xl font-bold text-[#0B2046] mb-8" style="font-family: 'Marcellus SC', serif;">Login</h2>

<div class="max-w-md">
    <form method="POST" action="{% url 'accounts:login' %}">
        {% csrf_token %}
        
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-4 rounded-lg {% if message.tags %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="mb-6">
            <label class="block text-gray-700 font-semibold mb-2">Email</label>
            <input type="email" name="email" required class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-8">
            <label class="block text-gray-700 font-semibold mb-2">Password</label>
            <input type="password" name="password" required class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button type="submit" class="w-full bg-[#0B2046] text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-800 transition">
            Login
        </button>

        <p class="text-center mt-6 text-gray-600">
            Belum punya akun? <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:text-blue-800 font-semibold">Daftar di sini</a>
        </p>
    </form>
</div>
{% endblock %}
