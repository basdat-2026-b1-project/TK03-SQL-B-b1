{% load static %} <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Baru - AeroMiles</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-aero-primary">

<nav class="navbar navbar-dark" style="background-color: #002b5c;">
    <div class="container">
        <a class="navbar-brand" href="#">✈️ AeroMiles</a>
        <div class="d-flex">
            <a href="#" class="btn btn-outline-light btn-sm me-2">Login</a>
            <a href="#" class="btn btn-primary btn-sm">Registrasi</a>
        </div>
    </div>
</nav>

<div class="container register-container">
    <div class="text-center mb-4">
        <div class="bg-primary text-white d-inline-block rounded p-3 mb-3">
            <h3 class="m-0">✈️</h3>
        </div>
        <h2>Daftar Akun Baru</h2>
        <p class="text-muted">Bergabung dengan program AeroMiles</p>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-4">
            <h5 class="mb-3">Registrasi</h5>
            <p class="text-muted small">Pilih peran dan lengkapi data Anda</p>

            <ul class="nav nav-pills nav-fill mb-4 p-1 rounded" style="background-color: #f1f3f5;">
                <li class="nav-item">
                    <button class="nav-link active" id="btn-member" onclick="switchRole('member')">Member</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="btn-staf" onclick="switchRole('staf')">Staf</button>
                </li>
            </ul>

            <form id="registerForm" method="POST" onsubmit="return validateForm()">
                {% csrf_token %}
                <input type="hidden" id="roleInput" name="role" value="member">

                <div class="mb-3">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Password <span class="text-danger">*</span></label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Konfirmasi Password <span class="text-danger">*</span></label>
                        <input type="password" id="confirm_password" class="form-control" required>
                        <span id="passwordError" class="text-danger d-none">Password tidak cocok!</span>
                    </div>
                </div>

                <hr class="my-4">
                <h6 class="mb-3">Data Pribadi</h6>

                <div class="mb-3">
                    <label class="form-label">Salutation <span class="text-danger">*</span></label>
                    <select name="salutation" class="form-select" required>
                        <option value="">Pilih</option>
                        <option value="Mr">Mr.</option>
                        <option value="Mrs">Mrs.</option>
                        <option value="Ms">Ms.</option>
                    </select>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nama Depan <span class="text-danger">*</span></label>
                        <input type="text" name="nama_depan" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Nama Belakang <span class="text-danger">*</span></label>
                        <input type="text" name="nama_belakang" class="form-control" required>
                    </div>
                </div>
                <div id="data-staf-container" class="d-none">
                    <hr class="my-4">
                    <h6 class="mb-3">Data Staf</h6>
                    <div class="mb-4">
                        <label class="form-label">Kode Maskapai <span class="text-danger">*</span></label>
                        <select name="kode_maskapai" class="form-select" id="kode_maskapai">
                            <option value="">Pilih maskapai</option>
                            {% for kode, nama in maskapai_choices %}
                                <option value="{{ kode }}">{{ nama }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mt-3" style="background-color: #004085;">Daftar</button>
            </form>
        </div>
    </div>
</div>

<script>
    // untuk mengganti tampilan form Member / Staf
    function switchRole(role) {
        let btnMember = document.getElementById('btn-member');
        let btnStaf = document.getElementById('btn-staf');
        let dataStafContainer = document.getElementById('data-staf-container');
        let inputKodeMaskapai = document.getElementById('kode_maskapai');
        let roleInput = document.getElementById('roleInput');

        if (role === 'staf') {
            btnStaf.classList.add('active');
            btnMember.classList.remove('active');
            dataStafContainer.classList.remove('d-none'); // munculkan field maskapai
            inputKodeMaskapai.setAttribute('required', 'true'); // wajib diisi
            roleInput.value = 'staf';
        } else {
            btnMember.classList.add('active');
            btnStaf.classList.remove('active');
            dataStafContainer.classList.add('d-none'); // hide field maskapai
            inputKodeMaskapai.removeAttribute('required'); // hapus wajib isi
            roleInput.value = 'member';
        }
    }

    // validasi di frontend (check password & confirm password)
    function validateForm() {
        let pwd = document.getElementById('password').value;
        let confirmPwd = document.getElementById('confirm_password').value;
        let errorMsg = document.getElementById('passwordError');

        if (pwd !== confirmPwd) {
            errorMsg.classList.remove('d-none');
            return false; // Mencegah form disubmit
        } else {
            errorMsg.classList.add('d-none');
            // Hapus alert dummy, ubah jadi return true agar data dikirim ke Django
            return true; 
        }
    }
</script>

</body>
</html>
